
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anshu Roy. Ai | Official Live AI Experience</title>
    <meta name="description" content="Generate high-quality pink floral masterpieces with your own face using advanced AI.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
          font-family: 'Inter', sans-serif; 
          background-color: #f48fb1; /* Soft Rose Pink from image */
          background-image: 
            radial-gradient(circle at center, rgba(255, 255, 255, 0.2) 0%, transparent 70%),
            url('https://www.transparenttextures.com/patterns/floral-paper.png'); /* Subtle floral texture */

          overflow-x: hidden;
        }
        .glass { 
          background: rgba(255, 255, 255, 0.92); 
          backdrop-filter: blur(12px); 
          border: 2px solid rgba(255, 255, 255, 0.5);
        }
        .pink-glow {
          box-shadow: 0 0 30px rgba(240, 98, 146, 0.4);
        }
        .deep-pink-shadow {
          box-shadow: 0 15px 40px -12px rgba(173, 20, 87, 0.3);
        }
        .text-ghera-pink {
          color: #ad1457;
        }
        .bg-ghera-pink {
          background-color: #f06292;
        }
        .border-ghera-pink {
          border-color: #f06292;
        }
        /* Custom Loading Bar Animation */
        @keyframes loading-stripes {
          from { background-position: 0 0; }
          to { background-position: 40px 0; }
        }
    </style>
